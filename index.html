<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Telegram Privé</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    #login, #links {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        text-align: center;
    }
    input[type="text"], input[type="password"] {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: none;
    }
    button {
        padding: 10px 20px;
        margin-top: 10px;
        border: none;
        border-radius: 5px;
        background: #0a84ff;
        color: #fff;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background: #0066cc;
    }
    a {
        display: block;
        margin: 10px 0;
        color: #0a84ff;
        text-decoration: none;
        font-weight: bold;
    }
    a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div id="login">
    <h2>Accès Privé Telegram</h2>
    <input type="text" id="name" placeholder="Nom / Prénom">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="checkPassword()">Se connecter</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="links" style="display:none;">
    <h2>Liens Telegram</h2>
    <a href="https://t.me/JRFERLANDJEUX" target="_blank">JRFERLANDJEUX</a>
    <a href="https://t.me/pcgameslist" target="_blank">PC Games List</a>
</div>

<script>
const correctPassword = "Maitre2026🔥";

function checkPassword() {
    const password = document.getElementById('password').value;
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const error = document.getElementById('error');

    if (!name || !email) {
        error.textContent = "Veuillez remplir tous les champs";
        return;
    }

    if (password === correctPassword) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('links').style.display = 'block';
    } else {
        error.textContent = "Mot de passe incorrect";
    }
}
</script>

</body>
</html>
